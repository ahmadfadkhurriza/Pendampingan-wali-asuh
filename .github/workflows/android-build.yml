name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release-key.keystore \
            -alias alias_name -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass my-secret-password -keypass my-secret-password \
            -dname "CN=Wali Asuh, OU=SRMA 24, O=Kediri, L=Kediri, S=Jawa Timur, C=ID"

      - name: Build Android APK
        run: |
          cd android
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=../release-key.keystore \
            -Pandroid.injected.signing.store.password=my-secret-password \
            -Pandroid.injected.signing.key.alias=alias_name \
            -Pandroid.injected.signing.key.password=my-secret-password

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release-key.keystore
